<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="styles.css" />
    <title>Job Application Form</title>
</head>
<body>
<div class="container">
    <form>
        <label for="name">Name: </label>
        <input type="text" id="name" />
        <label for="email">Email: </label>
        <input type="Email" id="email" />
        <label for="position">Choose a Position: </label>
        <select id="position" name="selection">
            <option value=" "disabled selected>select a role...</option>
<option value="Dataentryoperator">Data Entry Operator</option>
<option value="Software Engineer">Software Engineer</option>
<option value="Mern Stack Developer">Mern Stack Developer</option>
<option value="Python Developer">Python Developer</option>
<option value="Data Analyst">Data Analyst</option>
            </select>
        <fieldset class="radio-group">
            <legend>Availability</legend>
            <label>
            <input type="radio" name="availability" value="Part time">Part time</label>
            <label>
            <input type="radio" name="availability" value="Full time">Full time</label>
            
            </fieldset>
            <label for="message">message:</label>
            <textarea id="message" name:"message"></textarea>
            <button type="submit">submit</button>
        </form>
    </div>
</body>
</html>
